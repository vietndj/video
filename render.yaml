services:
  - type: web
    name: video-landing-api
    env: node
    buildCommand: pnpm install --prod=false && pnpm --filter @workspace/api-server build
    startCommand: cd artifacts/api-server && pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SEPAY_API_KEY
        sync: false
      - key: GOOGLE_SCRIPT_URL
        sync: false
      - key: COURSE_AMOUNT
        sync: false
      - key: SEPAY_BANK
        sync: false
      - key: SEPAY_ACCOUNT
        sync: false
      - key: SEPAY_HOLDER
        sync: false
      - key: MAKE_WEBHOOK_URL
        sync: false

